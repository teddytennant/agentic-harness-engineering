version = "1.0"

[metadata]
name = "hello-file"
description = "Trivial wiring-gate for the wizard evolve loop. Internet enabled so the in-container agent can reach the LLM (wizard always needs an LLM, so allow_internet must be true)."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 300.0
cpus = 1
memory_mb = 1024
storage_mb = 2048
# REQUIRED: allow_internet=false sets harbor network_mode="none" (no network at
# all), so the in-container agent can't reach the LLM. Must be true for wizard.
allow_internet = true
